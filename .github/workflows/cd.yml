name: CD - Release on master

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Print workspace for debug
        run: |
          echo "Working directory: $(pwd)"
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la

      - name: Build package (skip tests)
        run: mvn -B -V -f "$GITHUB_WORKSPACE/pom.xml" -DskipTests clean package

      - name: Locate built JAR
        id: findjar
        run: |
          JAR_PATH=$(ls "$GITHUB_WORKSPACE"/target/*.jar 2>/dev/null | head -n1 || true)
          if [ -z "$JAR_PATH" ]; then
            echo "No JAR found in $GITHUB_WORKSPACE/target/"
            exit 1
          fi
          echo "jar_path=$JAR_PATH" >> $GITHUB_OUTPUT

      - name: Get project version from pom.xml
        id: get_version
        run: |
          VERSION=$(mvn -q -DforceStdout -f "$GITHUB_WORKSPACE/pom.xml" help:evaluate -Dexpression=project.version)
          if [ -z "$VERSION" ]; then
            echo "Failed to read project.version from pom.xml"
            exit 1
          fi
          # If SNAPSHOT, append run number to make tag unique
          if [[ "$VERSION" == *"SNAPSHOT"* ]]; then
            TAG="v${VERSION}-${GITHUB_RUN_NUMBER}"
          else
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body: Automated release for version ${{ steps.get_version.outputs.version }} (GitHub Actions run ${{ github.run_id }})
          draft: false
          prerelease: false

      - name: Upload JAR to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.findjar.outputs.jar_path }}
          asset_name: nest-backend-${{ steps.get_version.outputs.version }}.jar
          asset_content_type: application/java-archive
